<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>UEvents Admin | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#fdd48e",
              "surface-container-low": "#fef2e1",
              "background": "#fff8f2",
              "surface-bright": "#fff8f2",
              "on-primary-fixed": "#271900",
              "secondary-fixed": "#ffdea8",
              "on-surface-variant": "#514532",
              "surface-container-lowest": "#ffffff",
              "surface-container-highest": "#ede1d0",
              "secondary": "#775a20",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",
              "surface-container-high": "#f3e6d6",
              "secondary-fixed-dim": "#e8c17d",
              "primary-fixed": "#ffdea8",
              "primary-fixed-dim": "#ffba20",
              "primary": "#7c5800",
              "on-tertiary": "#ffffff",
              "on-surface": "#201b11",
              "surface-dim": "#e4d8c8",
              "on-secondary-fixed": "#271900",
              "tertiary-container": "#00d7fe",
              "tertiary-fixed": "#b0ecff",
              "on-error": "#ffffff",
              "tertiary-fixed-dim": "#17d8ff",
              "on-tertiary-fixed": "#001f27",
              "tertiary": "#00687b",
              "on-tertiary-fixed-variant": "#004e5d",
              "on-secondary-container": "#785a20",
              "on-primary-container": "#6b4c00",
              "inverse-primary": "#ffba20",
              "surface-container": "#f9ecdb",
              "inverse-surface": "#363024",
              "inverse-on-surface": "#fbefde",
              "primary-container": "#ffb800",
              "error": "#ba1a1a",
              "on-primary-fixed-variant": "#5e4200",
              "outline": "#837560",
              "on-primary": "#ffffff",
              "surface-tint": "#7c5800",
              "outline-variant": "#d5c4ab",
              "surface-variant": "#ede1d0",
              "surface": "#fff8f2",
              "on-tertiary-container": "#005a6b",
              "on-background": "#201b11",
              "on-secondary-fixed-variant": "#5d4208",
              "error-container": "#ffdad6"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.4);
        }
        .bg-ethereal {
            background: radial-gradient(circle at top left, #fff8f2 0%, #ede1d0 100%);
        }
    </style>
</head>
<body class="bg-ethereal font-body text-on-background min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Background Decoration -->
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary-container/20 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-secondary-container/30 rounded-full blur-[120px] pointer-events-none"></div>
<main class="w-full max-w-md z-10">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center shadow-2xl shadow-primary-container/20 mb-4">
<span class="material-symbols-outlined text-on-primary-container text-4xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<h1 class="font-headline text-2xl font-black text-on-surface tracking-tight uppercase">UEvents</h1>
<p class="text-on-surface-variant font-medium text-sm mt-1">Admin Control Center</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-[32px] p-8 shadow-2xl shadow-black/5">
<form class="space-y-6">
<!-- Admin Email -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Admin Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">alternate_email</span>
<input class="w-full bg-surface-container-low/50 border-none rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline-variant font-medium text-on-surface" id="email" placeholder="admin@uevents.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-surface-container-low/50 border-none rounded-2xl py-4 pl-12 pr-12 focus:ring-2 focus:ring-primary-container transition-all placeholder:text-outline-variant font-medium text-on-surface" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-container text-on-primary-container font-headline font-bold py-4 rounded-2xl shadow-lg shadow-primary-container/30 hover:shadow-xl hover:shadow-primary-container/40 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200" type="submit">
                    Login to Dashboard
                </button>
</form>
<!-- Forgot Password -->
<div class="mt-8 text-center">
<a class="text-sm font-semibold text-primary hover:text-on-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
</div>
<!-- Secondary Navigation -->
<div class="mt-12 flex items-center justify-center gap-6">
<a class="flex items-center gap-2 px-6 py-3 glass-card rounded-full text-sm font-bold text-on-surface-variant hover:text-on-surface transition-all" href="#">
<span class="material-symbols-outlined text-lg">arrow_back</span>
                Return to Site
            </a>
<div class="w-1 h-1 bg-outline-variant rounded-full"></div>
<a class="text-sm font-bold text-outline hover:text-on-surface-variant transition-colors" href="#">Help Center</a>
</div>
</main>
<!-- Visual Footer Accent -->
<div class="fixed bottom-0 left-0 right-0 p-8 flex justify-between items-end opacity-40 pointer-events-none">
<div class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant">© 2024 UEvents Inc.</div>
<div class="flex gap-4">
<div class="w-8 h-[2px] bg-primary-container"></div>
<div class="w-16 h-[2px] bg-outline-variant"></div>
</div>
</div>
<!-- Decorative Image Context (Implicit via data-alt for aesthetic alignment) -->
<div class="hidden">
<img data-alt="vibrant music festival at night with golden stage lights and silhouettes of a cheering crowd in soft focus" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGq1YgRKnpaGRa3TAcYw9nmeD-xSTJ6VTlHkGE5KUyajQ_jwnN0mdzkrCAT6m6gYl4obtylLV5A9h16-a7at00UMeq7wLwNv9sQl4h9bR97D_nfSCDFO4n5p_OHOLlHcKSYysy-wxe30kKfbQ4LoCpSn13bnaXSA-e6TFld6ncJKExW_KFAwHQdAHq57RJ6Facr9gpaduBTNltzi-vHRj5CEPZAuY1YVYp62W346efRxTAv2Mar70PFWQB8cZkmR6HMr82c59zxNo"/>
</div>
</body></html>
